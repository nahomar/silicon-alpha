name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python tests (Phase 0 + quantiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: PYTHONPATH=. pytest tests/odte/test_quantile_parity.py tests/odte/test_dml_pricer.py -q

  cpp-heston:
    name: C++ Heston engine (build + self-test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make -C cpp CXX=g++
      - name: Self-test (BS-limit correctness + antithetic VR)
        run: ./cpp/heston_mc --selftest
